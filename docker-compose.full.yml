version: '3.8'

services:
  # Zookeeper - Coordination pour Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - delivery-network

  # Kafka - Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - delivery-network

  # Order Service
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - KAFKA_BROKER=kafka:29092
      - DB_PATH=./data/orders.db
    depends_on:
      - kafka
    volumes:
      - ./order-service/data:/app/data
    networks:
      - delivery-network
    restart: unless-stopped

  # Delivery Service
  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: delivery-service
    ports:
      - "50052:50052"
    environment:
      - GRPC_PORT=50052
      - KAFKA_BROKER=kafka:29092
    depends_on:
      - kafka
    networks:
      - delivery-network
    restart: unless-stopped

  # Tracking Service
  tracking-service:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    container_name: tracking-service
    ports:
      - "50053:50053"
    environment:
      - GRPC_PORT=50053
      - KAFKA_BROKER=kafka:29092
      - DB_PATH=./data/tracking.db
    depends_on:
      - kafka
    volumes:
      - ./tracking-service/data:/app/data
    networks:
      - delivery-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ORDER_SERVICE_URL=order-service:50051
      - DELIVERY_SERVICE_URL=delivery-service:50052
      - TRACKING_SERVICE_URL=tracking-service:50053
    depends_on:
      - order-service
      - delivery-service
      - tracking-service
    networks:
      - delivery-network
    restart: unless-stopped

networks:
  delivery-network:
    driver: bridge

volumes:
  order-data:
  tracking-data:
